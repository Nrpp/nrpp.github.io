<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Acceso al Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #f5f0e8;
      color: #1a1a1a;
      max-width: 420px;
      margin: 0 auto;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin: 0 0 4px 0;
    }
    .header p {
      font-size: 11px;
      opacity: 0.5;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .card {
      border: 1.5px solid #1a1a1a;
      border-radius: 4px;
      padding: 24px;
      background: #ffffff;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: 'IBM Plex Mono', monospace;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      background: #f9f7f3;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #1a1a1a;
      background: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      background: #1a1a1a;
      color: #f5f0e8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #msg {
      margin-top: 12px;
      font-size: 12px;
      color: #c0392b;
      min-height: 18px;
      text-align: center;
    }
    .hint {
      margin-top: 16px;
      font-size: 11px;
      opacity: 0.4;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💬 Chat Privado</h1>
    <p>Autenticación segura</p>
  </div>

  <div class="card">
    <label for="nick">Tu nombre o nick</label>
    <input id="nick" type="text" placeholder="Ej: Nico" maxlength="24" autocomplete="off">

    <label for="email">Correo</label>
    <input id="email" type="email" placeholder="tu@correo.com" autocomplete="email">

    <label for="password">Contraseña</label>
    <input id="password" type="password" placeholder="••••••••" maxlength="64" autocomplete="current-password">

    <button id="btnEnter">Entrar →</button>
    <div id="msg" aria-live="polite"></div>
    <div class="hint">Las credenciales se verifican con Firebase Auth.<br>Ninguna contraseña está en el código.</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    // Solo la config de Firebase (pública por diseño — no es un secreto)
    var firebaseConfig = {
      apiKey: "AIzaSyDve8JRi4IfQ_R3odAfhfalKLy6N_u8Br4",
      authDomain: "chat-261ba.firebaseapp.com",
      databaseURL: "https://chat-261ba-default-rtdb.firebaseio.com",
      projectId: "chat-261ba",
      storageBucket: "chat-261ba.firebasestorage.app",
      messagingSenderId: "532480688448",
      appId: "1:532480688448:web:fa038dd7c8b2118fa7baa5"
    };

    // Email del admin — usado para mostrar botones de admin en el chat
    // No es una contraseña, solo identifica el rol visual
    var ADMIN_EMAIL = "admin@tuchat.local"; // ← cambia esto al email de tu usuario admin

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    function $(id){ return document.getElementById(id); }

    function setLoading(on) {
      $("btnEnter").disabled = on;
      $("btnEnter").textContent = on ? "Entrando…" : "Entrar →";
    }

    function enter() {
      var nick  = $("nick").value.trim();
      var email = $("email").value.trim();
      var pass  = $("password").value;

      if (!nick)  { $("msg").textContent = "Pon un nick 😄"; return; }
      if (!email) { $("msg").textContent = "Falta el correo 📧"; return; }
      if (!pass)  { $("msg").textContent = "Falta la contraseña 🔐"; return; }

      setLoading(true);
      $("msg").textContent = "";

      firebase.auth().signInWithEmailAndPassword(email, pass)
        .then(function(cred) {
          try {
            sessionStorage.setItem("chat_nick", nick);
            sessionStorage.setItem("chat_uid", cred.user.uid);
            sessionStorage.setItem("chat_email", cred.user.email);
            sessionStorage.setItem("is_admin", cred.user.email === ADMIN_EMAIL ? "1" : "0");
          } catch(e) {}
          window.location.href = "chat.html";
        })
        .catch(function(err) {
          setLoading(false);
          var msgs = {
            "auth/user-not-found":   "Usuario no encontrado 🚫",
            "auth/wrong-password":   "Contraseña incorrecta 🔐",
            "auth/invalid-email":    "Correo no válido 📧",
            "auth/too-many-requests":"Demasiados intentos, espera un momento ⏳",
            "auth/invalid-credential": "Credenciales incorrectas 🚫"
          };
          $("msg").textContent = msgs[err.code] || ("Error: " + err.message);
        });
    }

    $("btnEnter").addEventListener("click", enter);
    $("password").addEventListener("keypress", function(e){ if (e.keyCode===13) enter(); });
    $("nick").addEventListener("keypress", function(e){ if (e.keyCode===13) $("email").focus(); });
    $("email").addEventListener("keypress", function(e){ if (e.keyCode===13) $("password").focus(); });
  </script>
</body>
</html>
