<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Chat Privado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #f5f0e8;
      color: #1a1a1a;
      max-width: 700px;
      margin: 0 auto;
      padding: 8px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1.5px solid #1a1a1a;
    }
    .topbar-title { font-weight: 600; }
    .small { font-size: 11px; opacity: 0.6; }
    .small a { color: inherit; text-decoration: underline; }
    #notice {
      margin: 4px 0;
      font-size: 12px;
      color: #555;
      min-height: 18px;
      font-style: italic;
    }
    .chat-box {
      border: 1.5px solid #1a1a1a;
      border-radius: 4px;
      height: 65vh;
      overflow-y: auto;
      padding: 8px;
      background: #ffffff;
    }
    .msg {
      padding: 7px 10px;
      margin: 5px 0;
      border-radius: 4px;
      border: 1px solid #e0dbd0;
      background: #fff;
    }
    .meta {
      font-size: 11px;
      opacity: 0.5;
      margin-bottom: 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .msg.me {
      border-color: #a8c4e0;
      background: #eef5ff;
      margin-left: 12%;
    }
    /* Mensajes de IA */
    .msg.ai {
      border-color: #b8dab0;
      background: #f0faf0;
      border-left: 3px solid #4a9e44;
    }
    .msg.ai .meta { color: #3a7e35; opacity: 0.8; }
    .row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .row input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      font-size: 15px;
      font-family: 'IBM Plex Mono', monospace;
      border: 1.5px solid #1a1a1a;
      border-radius: 4px;
      background: #fff;
    }
    .row input[type="text"]:focus {
      outline: none;
      background: #fffef8;
    }
    .row button {
      padding: 10px 16px;
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      background: #1a1a1a;
      color: #f5f0e8;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .row button:hover { opacity: 0.85; }
    .admin-btns { display: none; margin-left: 8px; }
    .admin-btns button {
      font-size: 11px;
      padding: 4px 8px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
    }
    .modal {
      display: none; position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.65);
      justify-content: center; align-items: center;
    }
    .modal-content {
      background: #fff;
      padding: 20px;
      border-radius: 4px;
      border: 1.5px solid #1a1a1a;
      text-align: center;
      max-width: 300px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .modal-content p { margin: 0 0 14px; font-size: 14px; }
    .modal-content button { margin: 4px; padding: 8px 16px; font-family: 'IBM Plex Mono', monospace; }
    .modal-content #yesBtn { background: #c0392b; color: #fff; border: none; border-radius: 3px; }
    .modal-content #noBtn  { background: #f5f0e8; border: 1px solid #1a1a1a; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-title">💬 <span id="roomLabel"></span></div>
    <div class="small">
      <span id="nickLabel"></span> &nbsp;|&nbsp; <a href="index.html">Salir</a>
      <span id="adminBtns" class="admin-btns">
        <button id="deleteBtn">🗑 Borrar</button>
      </span>
    </div>
  </div>

  <div id="notice" aria-live="polite"></div>
  <div id="messages" class="chat-box" aria-live="polite"></div>

  <div class="row">
    <input id="msgInput" type="text" maxlength="500" placeholder="Escribe un mensaje… (@ai pregunta para la IA)">
    <button id="sendBtn">→</button>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <p>¿Borrar todo el chat?</p>
      <button id="yesBtn">Sí, borrar</button>
      <button id="noBtn">Cancelar</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="chat.js"></script>

  <script>
    var isAdmin = sessionStorage.getItem("is_admin") === "1";
    if (isAdmin) { document.getElementById("adminBtns").style.display = "inline"; }

    var modal     = document.getElementById("modal");
    var deleteBtn = document.getElementById("deleteBtn");
    var noBtn     = document.getElementById("noBtn");
    var yesBtn    = document.getElementById("yesBtn");

    if (deleteBtn) deleteBtn.onclick = function(){ modal.style.display = "flex"; };
    if (noBtn)     noBtn.onclick     = function(){ modal.style.display = "none"; };
    if (yesBtn)    yesBtn.onclick    = function(){
      modal.style.display = "none";
      if (typeof window.deleteChat === "function") window.deleteChat();
    };
  </script>
</body>
</html>
