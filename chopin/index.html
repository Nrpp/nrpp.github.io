<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Chopin: La Mansión del Genio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Barra de progreso -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <span id="progressText">0/6 habitaciones</span>
    </div>

    <!-- Imagen de Chopin flotante -->
    <div class="chopin-image">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Chopin_by_Wierusz-Kowalski.jpg" alt="Frédéric Chopin">
    </div>

    <!-- Contenido principal -->
    <div class="container" id="gameContainer">
        <!-- Se cargará dinámicamente -->
    </div>

    <!-- Audio control -->
    <audio id="backgroundMusic" loop>
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-5.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
